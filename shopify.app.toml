# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "72f82a63b0e306e2138f3fcc90cdd779"
name = "Slidez AI Try-On for Shopify"
application_url = "https://slidez-shopify-extension.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
scopes = "read_products,write_products,read_analytics,read_store,read_orders"

[auth]
redirect_urls = [ "https://slidez-shopify-extension.vercel.app/auth/callback" ]

[app_proxy]
url = "https://slidez-shopify-extension.vercel.app/api/product-check"
subpath = "try-on"
prefix = "apps"

